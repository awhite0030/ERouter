name: Release

# Tag v* or manual dispatch → GitHub Release + CLI tarball asset.
# Docker image: docker-publish.yml (same tag).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.1). Empty = package.json version"
        required: false
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # cache only when lockfile exists (generated in repo root)
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          VER="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Resolved $TAG ($VER)"

      - name: Sync package versions
        run: |
          node -e "
            const fs=require('fs');
            const v='${{ steps.ver.outputs.version }}';
            for (const f of ['package.json','cli/package.json','tests/package.json']) {
              try {
                const p=JSON.parse(fs.readFileSync(f,'utf8'));
                p.version=v;
                fs.writeFileSync(f, JSON.stringify(p,null,2)+'\n');
                console.log(f,'->',v);
              } catch(e) { console.log('skip', f); }
            }
          "

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Build CLI standalone
        id: cli_build
        continue-on-error: true
        working-directory: cli
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: npm run build

      - name: Pack CLI tarball
        if: steps.cli_build.outcome == 'success'
        working-directory: cli
        run: npm pack

      - name: Upload artifact
        if: steps.cli_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: erouter-cli-${{ steps.ver.outputs.version }}
          path: cli/erouter-*.tgz
          if-no-files-found: ignore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ERouter ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: cli/erouter-*.tgz
          fail_on_unmatched_files: false
          body: |
            ## ERouter ${{ steps.ver.outputs.tag }}

            ### Docker (GitHub Packages)
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/erouter:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/erouter:latest

            docker run --rm -p 20128:20128 \
              -v erouter-data:/app/data \
              ghcr.io/${{ github.repository_owner }}/erouter:latest
            ```

            Package page: https://github.com/users/${{ github.repository_owner }}/packages/container/package/erouter

            ### CLI
            From source (dev):
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd ERouter/cli && npm install -g .
            erouter
            ```

            Dashboard: http://localhost:20128
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
