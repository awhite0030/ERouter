server:
  host: 127.0.0.1
  port: 8082

auth:
  enabled: true
  header: x-api-key
  keys:
    - id: alice
      secret: alice-secret
      scopes: ["read"]
      rpm: 30
      burst: 10
    - id: bob
      secret: bob-secret
      scopes: ["read", "admin"]
      rpm: 120
      burst: 30

rateLimit:
  enabled: true
  defaultRpm: 60
  defaultBurst: 30

routes:
  - id: jsonplaceholder-post
    match:
      path: /demo/posts/:id
    upstream:
      url: https://jsonplaceholder.typicode.com/posts/{id}
    cache:
      ttlMs: 60000

resources:
  pool:
    dir: ./data/pool
