server:
  host: 127.0.0.1
  port: 8080

auth:
  enabled: false
  header: x-api-key
  keys:
    - id: local
      secret: dev-secret
      scopes: ["*"]
      rpm: 600
      burst: 60

rateLimit:
  enabled: true
  defaultRpm: 60
  defaultBurst: 30

cache:
  enabled: true
  defaultTtlMs: 30000
  maxEntries: 1000

routes:
  - id: github-user
    match:
      path: /github/users/:login
    upstream:
      url: https://api.github.com/users/{login}
      headers:
        Accept: application/vnd.github+json
        User-Agent: erouter-demo
    transform:
      pick: [login, id, name, bio, public_repos, followers, html_url]
    cache:
      ttlMs: 60000

  - id: book-search
    match:
      path: /books/:q
    aggregator:
      strategy: json-merge
      sources:
        - id: openlibrary
          url: https://openlibrary.org/search.json?q={q}
          timeoutMs: 4000
        - id: googlebooks
          url: https://www.googleapis.com/books/v1/volumes?q={q}
          timeoutMs: 4000
      merge:
        as: results
        pick:
          openlibrary: docs
          googlebooks: items
    transform:
      wrapAs: books
    cache:
      ttlMs: 120000

  - id: weather-merge
    match:
      path: /weather/:city
    aggregator:
      strategy: json-merge
      sources:
        - id: open-meteo
          url: https://geocoding-api.open-meteo.com/v1/search?name={city}&count=1
        - id: wttr
          url: https://wttr.in/{city}?format=j1
      merge:
        as: forecast
    cache:
      ttlMs: 600000

  - id: study-pool
    match:
      path: /pool/:key
    aggregator:
      strategy: pool
      poolKey: "{key}.json"

resources:
  pool:
    dir: ./data/pool
