name: Release

# Manual or tag-driven release: build CLI standalone + GitHub Release notes.
# Docker image is handled by docker-publish.yml on v* tags.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.1). Empty = use package.json"
        required: false
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - run: npm ci --no-audit --no-fund

      - name: Build CLI standalone pack
        working-directory: cli
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: npm run build

      - name: Pack CLI tarball
        working-directory: cli
        run: npm pack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: erouter-cli-${{ steps.ver.outputs.version }}
          path: cli/erouter-*.tgz

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ERouter ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: cli/erouter-*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
