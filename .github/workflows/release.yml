name: Release

# Tag v* or manual dispatch → GitHub Release + CLI tarball asset.
# Docker image: docker-publish.yml (same tag).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.1). Empty = package.json version"
        required: false
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          VER="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Resolved $TAG ($VER)"

      - name: Sync package versions
        run: |
          node -e "
            const fs=require('fs');
            const v='${{ steps.ver.outputs.version }}';
            for (const f of ['package.json','cli/package.json','tests/package.json']) {
              try {
                const p=JSON.parse(fs.readFileSync(f,'utf8'));
                p.version=v;
                fs.writeFileSync(f, JSON.stringify(p,null,2)+'\n');
                console.log(f,'->',v);
              } catch(e) { console.log('skip', f); }
            }
          "

      - run: npm ci --no-audit --no-fund

      - name: Build CLI standalone
        working-directory: cli
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: npm run build

      - name: Pack CLI tarball
        working-directory: cli
        run: npm pack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: erouter-cli-${{ steps.ver.outputs.version }}
          path: cli/erouter-*.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ERouter ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            cli/erouter-*.tgz
          body: |
            ## ERouter ${{ steps.ver.outputs.tag }}

            ### Install CLI (from this release)
            ```bash
            npm install -g ./erouter-${{ steps.ver.outputs.version }}.tgz
            erouter --version
            ```

            ### Docker (GitHub Packages)
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/erouter:${{ steps.ver.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/erouter:latest
            docker run --rm -p 20128:20128 -v erouter-data:/app/data ghcr.io/${{ github.repository_owner }}/erouter:latest
            ```

            ### Dashboard
            Open http://localhost:20128 after start.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
